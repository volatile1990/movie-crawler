name: Zappiti Movie Crawler
version: "0.3.0"
slug: zappiti_movie_crawler
description: Crawl Zappiti movie shares and publish the catalog to GitHub assets.
url: https://github.com/volatile1990/movie-crawler
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: services
boot: auto
init: false
panel_icon: mdi:movie-search
map:
  - media:ro
  - share:ro
options:
  sources:
    - name: Zappiti1
      mounted_path: /media/Zappiti1
      smb_unc: "\\\\192.168.1.91\\Volume_9a4a7d5c4a7d365b"
    - name: Zappiti2
      mounted_path: /media/Zappiti2
      smb_unc: "\\\\192.168.1.91\\Volume_ca7a3d6d7a3d5801"
  libraries:
    - FILME
    - SERIEN
    - DEMOS
  smb_username: guest
  smb_password: guest
  smb_require_signing: false
  smb_require_secure_negotiate: false
  prefer_mounted_paths: true
  enable_smb_fallback: true
  min_file_size_mb: 10
  enable_ffprobe: true
  run_on_start: true
  run_once: false
  scan_interval_minutes: 360
  tmdb_api_key: ""
  tmdb_language: de-DE
  tmdb_region: DE
  enable_imdb_ratings: true
  imdb_ratings_dataset_url: https://datasets.imdbws.com/title.ratings.tsv.gz
  imdb_cache_ttl_hours: 24
  github_repo: volatile1990/eclipse-cinema-homepage
  github_branch: main
  github_token: ""
  github_assets_prefix: assets
  github_commit_message: "Update Zappiti media catalog"
  local_output_dir: /data/output
  request_timeout_seconds: 20
  publish_require_all_sources_reachable: true
  publish_allow_empty_catalog: false
  min_files_per_library: []
  max_item_drop_percent: 20
  skip_github_push_when_unchanged: true
schema:
  sources:
    - name: str
      mounted_path: str
      smb_unc: str
  libraries:
    - str
  smb_username: str
  smb_password: password
  smb_require_signing: bool
  smb_require_secure_negotiate: bool
  prefer_mounted_paths: bool
  enable_smb_fallback: bool
  min_file_size_mb: int
  enable_ffprobe: bool
  run_on_start: bool
  run_once: bool
  scan_interval_minutes: int
  tmdb_api_key: password
  tmdb_language: str
  tmdb_region: str
  enable_imdb_ratings: bool
  imdb_ratings_dataset_url: str
  imdb_cache_ttl_hours: int
  github_repo: str
  github_branch: str
  github_token: password
  github_assets_prefix: str
  github_commit_message: str
  local_output_dir: str
  request_timeout_seconds: int
  publish_require_all_sources_reachable: bool
  publish_allow_empty_catalog: bool
  min_files_per_library:
    - name: str
      min_files: int
  max_item_drop_percent: int
  skip_github_push_when_unchanged: bool
